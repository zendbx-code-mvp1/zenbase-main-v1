# Default server — fallback for unmatched requests
# This is the catch-all. Per-project configs will be added as separate
# files in conf.d/ (e.g. myapp.conf) and will match before this block.

server {
    listen 80 default_server;
    server_name _;

    location / {
        return 200 'ZenBase Reverse Proxy Running';
        add_header Content-Type text/plain;
    }

    # Health check endpoint for monitoring
    location /nginx-health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
