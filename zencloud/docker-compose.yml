version: '3.8'

networks:
  zenbase-net:
    driver: bridge
    # All services share this network so Nginx can reach
    # deployed app containers by their container name/IP.
    # Deployed project containers should also be attached
    # to this network via the deployment service.

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: zencloud-postgres
    networks:
      - zenbase-net
    environment:
      POSTGRES_USER: zencloud
      POSTGRES_PASSWORD: zencloud
      POSTGRES_DB: zencloud
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zencloud"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis
  redis:
    image: redis:7-alpine
    container_name: zencloud-redis
    networks:
      - zenbase-net
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build: ./backend
    container_name: zencloud-backend
    networks:
      - zenbase-net
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://zencloud:zencloud@postgres:5432/zencloud
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: dev-secret-key-change-in-production
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      GITHUB_REDIRECT_URI: ${GITHUB_REDIRECT_URI:-http://localhost:3000/auth/callback}
      FRONTEND_URL: http://localhost:3000
      # Shared Docker network — deployment service attaches project containers here
      DOCKER_NETWORK: zenbase-net
      # Nginx config dir as seen from inside the backend container.
      # We mount the same host path so the backend can write .conf files
      # that Nginx picks up on reload.
      NGINX_CONF_DIR: /nginx/conf.d
      NGINX_CONTAINER: zenbase-nginx
      BASE_DOMAIN: localhost
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /var/run/docker.sock:/var/run/docker.sock
      # Mount nginx conf.d so the backend can write per-project configs
      - ./nginx/conf.d:/nginx/conf.d
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Celery Worker
  celery-worker:
    build: ./backend
    container_name: zencloud-celery-worker
    networks:
      - zenbase-net
    environment:
      DATABASE_URL: postgresql://zencloud:zencloud@postgres:5432/zencloud
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: dev-secret-key-change-in-production
      DOCKER_HOST: unix:///var/run/docker.sock
      DOCKER_NETWORK: zenbase-net
      NGINX_CONF_DIR: /nginx/conf.d
      NGINX_CONTAINER: zenbase-nginx
      BASE_DOMAIN: localhost
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /var/run/docker.sock:/var/run/docker.sock
      - ./nginx/conf.d:/nginx/conf.d
    command: celery -A app.workers.celery_app worker --loglevel=info

  # Nginx Reverse Proxy
  nginx:
    image: nginx:1.25-alpine
    container_name: zenbase-nginx
    networks:
      - zenbase-net
    ports:
      - "80:80"
    volumes:
      # Main nginx config
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # Per-app route configs (modular — one file per deployed project)
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/nginx-health"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
  redis_data:
